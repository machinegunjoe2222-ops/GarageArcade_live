<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiring Match — Garage Arcade</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root{
    --bg:#14161b; --panel:#1c1f25; --metal-1:#2c313a; --metal-2:#525a66; --metal-3:#9aa4af;
    --chrome:#eef1f4; --line:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.16);
    --orange:#ff5e2c; --orange-soft:rgba(255,94,44,.35);
    --blue:#2bd6ff; --blue-soft:rgba(43,214,255,.3);
    --text:#e7eaee; --text-dim:#919aa3; --text-faint:#5b626c;
    --font-display:'Rajdhani',sans-serif; --font-mono:'JetBrains Mono',monospace;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:var(--font-mono);
    display:flex; flex-direction:column; align-items:center;
    padding: 28px 16px 60px;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 56px 56px;
  }
  a{ color:var(--blue); text-decoration:none; }
  .topbar{ width:100%; max-width:560px; display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; font-size:.8rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim); }
  .topbar a:hover{ color:var(--chrome); }

  h1{
    font-family:var(--font-display); font-weight:700; letter-spacing:.1em;
    font-size:clamp(1.6rem,5vw,2.4rem); margin:6px 0 4px; text-align:center;
    color:var(--chrome);
  }
  .subtitle{ color:var(--text-dim); font-size:.85rem; text-align:center; margin:0 0 22px; letter-spacing:.04em; }

  .hud{
    display:flex; gap:14px; margin-bottom:18px; flex-wrap:wrap; justify-content:center;
  }
  .hud-chip{
    background:var(--panel); border:1px solid var(--line); border-radius:8px;
    padding:8px 16px; text-align:center; min-width:108px;
  }
  .hud-chip .label{ font-size:.62rem; letter-spacing:.2em; color:var(--text-faint); display:block; margin-bottom:4px; }
  .hud-chip .value{ font-family:var(--font-display); font-size:1.3rem; font-weight:700; color:var(--chrome); }
  .hud-chip.warn .value{ color:var(--orange); }

  .board{
    display:grid; grid-template-columns: repeat(4, 1fr); gap:12px;
    width:min(440px, 92vw);
  }

  .cell{ aspect-ratio:1; perspective:600px; }
  .cell button{
    width:100%; height:100%; border:none; padding:0; cursor:pointer;
    background:none; position:relative; transform-style:preserve-3d;
    transition: transform .45s cubic-bezier(.4,.2,.2,1);
    border-radius:10px;
  }
  .cell button.flipped{ transform:rotateY(180deg); }
  .cell button:disabled{ cursor:default; }

  .face{
    position:absolute; inset:0; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    backface-visibility:hidden; border:1px solid var(--line-strong);
  }
  .face.front{
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.03) 0 2px, transparent 2px 8px),
      linear-gradient(160deg, var(--metal-2), var(--metal-1));
  }
  .face.front::after{
    content:''; position:absolute; inset:8px; border-radius:6px;
    border:1px dashed var(--line-strong);
  }
  .face.front svg{ width:22px; height:22px; stroke:var(--text-faint); opacity:.5; }
  .face.back{
    background: var(--panel); transform: rotateY(180deg); color:var(--orange);
  }
  .face.back svg{ width:34px; height:34px; }

  .cell.matched .face.back{ color:var(--blue); box-shadow: inset 0 0 0 2px var(--blue-soft); }
  .cell.matched button{ animation: settle .5s ease; }
  @keyframes settle{ 0%{ transform:rotateY(180deg) scale(1); } 50%{ transform:rotateY(180deg) scale(1.08); } 100%{ transform:rotateY(180deg) scale(1); } }

  .cell.mismatch button{ animation: shake .4s ease; }
  @keyframes shake{
    0%,100%{ transform:rotateY(180deg) translateX(0); }
    25%{ transform:rotateY(180deg) translateX(-4px); }
    75%{ transform:rotateY(180deg) translateX(4px); }
  }

  .controls{ margin-top:22px; display:flex; gap:12px; }
  .btn{
    font-family:var(--font-display); font-weight:700; letter-spacing:.14em; font-size:.85rem;
    text-transform:uppercase; padding:11px 22px; border-radius:8px; cursor:pointer;
    border:1px solid var(--line-strong); background:var(--panel); color:var(--chrome);
    transition: filter .15s ease, transform .15s ease;
  }
  .btn:hover{ filter:brightness(1.15); transform:translateY(-1px); }
  .btn.primary{
    background: linear-gradient(180deg, var(--chrome), var(--metal-3)); color:#0b0c0f;
  }

  .overlay{
    position:fixed; inset:0; background:rgba(11,12,15,.86);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .25s ease;
    z-index:10;
  }
  .overlay.show{ opacity:1; pointer-events:all; }
  .overlay-card{
    background:var(--panel); border:1px solid var(--line-strong); border-radius:14px;
    padding:32px 36px; text-align:center; max-width:340px;
  }
  .overlay-card h2{
    font-family:var(--font-display); letter-spacing:.1em; margin:0 0 10px; font-size:1.7rem;
  }
  .overlay-card.success h2{ color:var(--blue); }
  .overlay-card.fail h2{ color:var(--orange); }
  .overlay-card p{ color:var(--text-dim); font-size:.85rem; margin:0 0 20px; }
</style>
</head>
<body>

<div class="topbar">
  <a href="../../index.html">&larr; Back to Garage</a>
  <span>BAY 02 / WIRING MATCH</span>
</div>

<h1>WIRING MATCH</h1>
<p class="subtitle">Flip the connectors. Match every sensor to its circuit before the diagnostic clock runs out.</p>

<div class="hud">
  <div class="hud-chip">
    <span class="label">TIME LEFT</span>
    <span class="value" id="timeVal">75</span>
  </div>
  <div class="hud-chip">
    <span class="label">PAIRS</span>
    <span class="value" id="pairsVal">0 / 8</span>
  </div>
  <div class="hud-chip">
    <span class="label">MOVES</span>
    <span class="value" id="movesVal">0</span>
  </div>
</div>

<div class="board" id="board"></div>

<div class="controls">
  <button class="btn primary" id="restartBtn">RESTART DIAGNOSTIC</button>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-card" id="overlayCard">
    <h2 id="overlayTitle">ALL CIRCUITS MATCHED</h2>
    <p id="overlaySub">Cleared in 00 moves with 00s on the clock.</p>
    <button class="btn primary" id="overlayBtn">RUN AGAIN</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  const ICONS = [
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.2"/><path d="M12 9.8c0-3 1.5-5.3 4.2-6.1-1 2.7-.2 5 2 6.5-3 .6-5.2-.1-6.2-2.4z"/><path d="M14.2 12c3 0 5.3 1.5 6.1 4.2-2.7-1-5-.2-6.5 2-.6-3 .1-5.2 2.4-6.2z"/><path d="M12 14.2c0 3-1.5 5.3-4.2 6.1 1-2.7.2-5-2-6.5 3-.6 5.2.1 6.2 2.4z"/><path d="M9.8 12c-3 0-5.3-1.5-6.1-4.2 2.7 1 5 .2 6.5-2 .6 3-.1 5.2-2.4 6.2z"/></svg>`,
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="1.5"/><rect x="9.5" y="9.5" width="5" height="5" rx="1"/><path d="M9 2v4M12 2v4M15 2v4M9 18v4M12 18v4M15 18v4M2 9h4M2 12h4M2 15h4M18 9h4M18 12h4M18 15h4"/></svg>`,
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.4"/><path d="M12 3v6.6M12 14.4V21M5.2 7.2l4.7 4.7M14.1 12.7l4.7 4.7M18.8 7.2l-4.7 4.7M9.9 12.7L5.2 17.4"/></svg>`,
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 1 0-4.4 5.4L4 18l2 2 6.3-6.3a4 4 0 0 0 5.4-4.4l-3 3-2-2 3-3z"/></svg>`,
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M22 12h-3M5 12H2M19.07 4.93l-2.12 2.12M7.05 16.95l-2.12 2.12M19.07 19.07l-2.12-2.12M7.05 7.05L4.93 4.93"/></svg>`,
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 13V9M9 2h6M19 6l1.5-1.5"/></svg>`,
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="16" height="10" rx="1.5"/><path d="M19 10h2v4h-2M7 7V5M11 7V5"/></svg>`,
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2h6v6l-1 2v8a2 2 0 0 1-4 0v-8l-1-2V2z"/><path d="M9 5h6M9 8h6"/></svg>`
  ];

  const TIME_LIMIT = 75;
  const board = document.getElementById('board');
  const timeVal = document.getElementById('timeVal');
  const pairsVal = document.getElementById('pairsVal');
  const movesVal = document.getElementById('movesVal');
  const overlay = document.getElementById('overlay');
  const overlayCard = document.getElementById('overlayCard');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlaySub = document.getElementById('overlaySub');

  let flipped = [];
  let matchedCount = 0;
  let moves = 0;
  let timeLeft = TIME_LIMIT;
  let timerId = null;
  let locked = false;

  function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function buildBoard(){
    board.innerHTML = '';
    flipped = [];
    matchedCount = 0;
    moves = 0;
    timeLeft = TIME_LIMIT;
    locked = false;

    pairsVal.textContent = '0 / 8';
    movesVal.textContent = '0';
    timeVal.textContent = String(timeLeft);
    timeVal.parentElement.classList.remove('warn');

    const deck = shuffle([...ICONS, ...ICONS].map((icon, i) => ({ icon, pairId: i % ICONS.length })));
    shuffle(deck);

    deck.forEach((card, idx) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.pairId = card.pairId;

      const btn = document.createElement('button');
      btn.innerHTML = `
        <span class="face front">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M7 12h10"/></svg>
        </span>
        <span class="face back">${card.icon}</span>
      `;
      btn.addEventListener('click', () => onFlip(cell, btn));
      cell.appendChild(btn);
      board.appendChild(cell);
    });

    if(timerId) clearInterval(timerId);
    timerId = setInterval(tick, 1000);
  }

  function tick(){
    timeLeft -= 1;
    timeVal.textContent = String(Math.max(0, timeLeft));
    if(timeLeft <= 15) timeVal.parentElement.classList.add('warn');
    if(timeLeft <= 0){
      clearInterval(timerId);
      finish(false);
    }
  }

  function onFlip(cell, btn){
    if(locked || btn.classList.contains('flipped') || cell.classList.contains('matched')) return;

    btn.classList.add('flipped');
    flipped.push({ cell, btn });

    if(flipped.length === 2){
      moves += 1;
      movesVal.textContent = String(moves);
      locked = true;

      const [a, b] = flipped;
      if(a.cell.dataset.pairId === b.cell.dataset.pairId){
        a.cell.classList.add('matched');
        b.cell.classList.add('matched');
        matchedCount += 1;
        pairsVal.textContent = `${matchedCount} / 8`;
        flipped = [];
        locked = false;
        if(matchedCount === 8){
          clearInterval(timerId);
          finish(true);
        }
      } else {
        setTimeout(() => {
          a.cell.classList.add('mismatch');
          b.cell.classList.add('mismatch');
          setTimeout(() => {
            a.btn.classList.remove('flipped');
            b.btn.classList.remove('flipped');
            a.cell.classList.remove('mismatch');
            b.cell.classList.remove('mismatch');
            flipped = [];
            locked = false;
          }, 420);
        }, 500);
      }
    }
  }

  function finish(success){
    locked = true;
    if(success){
      overlayCard.className = 'overlay-card success';
      overlayTitle.textContent = 'ALL CIRCUITS MATCHED';
      overlaySub.textContent = `Cleared in ${moves} moves with ${Math.max(0,timeLeft)}s left on the clock.`;
    } else {
      overlayCard.className = 'overlay-card fail';
      overlayTitle.textContent = 'DIAGNOSTIC TIMEOUT';
      overlaySub.textContent = `${matchedCount} of 8 circuits matched in ${moves} moves. Try again.`;
    }
    overlay.classList.add('show');
  }

  document.getElementById('restartBtn').addEventListener('click', () => {
    overlay.classList.remove('show');
    buildBoard();
  });
  document.getElementById('overlayBtn').addEventListener('click', () => {
    overlay.classList.remove('show');
    buildBoard();
  });

  buildBoard();
})();
</script>
</body>
</html>
